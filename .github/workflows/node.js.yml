name: Deploy Backend (NestJS + Prisma)

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.19.1
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: ⚙️ Prisma Generate
        run: npx prisma generate

      - name: 🗄️ Run Migrations
        run: npx prisma migrate deploy

      - name: 🏗️ Build project
        run: npm run build

      - name: 🚀 Start or Restart PM2
        run: |
          pm2 describe blendit-backend > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "🔄 Restarting existing app..."
            pm2 restart blendit-backend
          else
            echo "🚀 Starting new app..."
            pm2 start dist/main.js --name blendit-backend
          fi

      - name: 💾 Save PM2 process
        run: pm2 save
