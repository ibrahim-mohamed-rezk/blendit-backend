
name: Node.js CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:

    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [18.19.1]
    env:
      CLOUDINARY_API_KEY: ${{secrets.CLOUDINARY_API_KEY}}
      CLOUDINARY_API_SECRET: ${{secrets.CLOUDINARY_API_SECRET}}
      CLOUDINARY_CLOUD_NAME: ${{secrets.CLOUDINARY_CLOUD_NAME}}
      SEED_ADMIN_PASSWORD: ${{secrets.SEED_ADMIN_PASSWORD}}
      SEED_ADMIN_EMAIL: ${{secrets.SEED_ADMIN_EMAIL}}
      PRISMA_CONNECT_ON_STARTUP: ${{secrets.PRISMA_CONNECT_ON_STARTUP}}
      PORT: ${{secrets.PORT}}
      JWT_EXPIRATION: ${{secrets.JWT_EXPIRATION}}
      JWT_SECRET: ${{secrets.JWT_SECRET}}
      DATABASE_URL: ${{secrets.DATABASE_URL}}
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - name: Change Directory
      run: cd /home/arxeg-brokers/actions-runner/_work/arx-brokers/arx-brokers
    - name: Restart PM2
      run: pm2 restart arx-brokers
   
