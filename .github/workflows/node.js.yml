name: Deploy Backend (NestJS + Prisma)

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: self-hosted
    env:
      SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
      SEED_ADMIN_EMAIL: ${{ secrets.SEED_ADMIN_EMAIL }}
      PRISMA_CONNECT_ON_STARTUP: ${{ secrets.PRISMA_CONNECT_ON_STARTUP }}
      PORT: ${{ secrets.PORT }}
      JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WAPILOT_API_TOKEN: ${{ secrets.WAPILOT_API_TOKEN }}
      WAPILOT_INSTANCE_ID: ${{ secrets.WAPILOT_INSTANCE_ID }}
      UPLOADS_ROOT: ${{ secrets.UPLOADS_ROOT }}
      
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.19.1
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: Create .env
        run: |
          # Persistent uploads outside the repo (survives git clean on checkout). Override with GitHub secret UPLOADS_ROOT.
          UPLOADS_ROOT="${{ secrets.UPLOADS_ROOT }}"
          if [ -z "$UPLOADS_ROOT" ]; then UPLOADS_ROOT="$HOME/blendit-data/uploads"; fi
          mkdir -p "$UPLOADS_ROOT/products" "$UPLOADS_ROOT/customer-display"

          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "PORT=${{ secrets.PORT }}" >> .env
          echo "SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}" >> .env
          echo "SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }}" >> .env
          echo "PRISMA_CONNECT_ON_STARTUP=${{ secrets.PRISMA_CONNECT_ON_STARTUP }}" >> .env
          echo "JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}" >> .env
          echo "WAPILOT_INSTANCE_ID=${{ secrets.WAPILOT_INSTANCE_ID }}" >> .env
          echo "WAPILOT_API_TOKEN=${{ secrets.WAPILOT_API_TOKEN }}" >> .env
          echo "UPLOADS_ROOT=$UPLOADS_ROOT" >> .env


      - name: ⚙️ Prisma Generate
        run: npx prisma generate

      - name: 🗄️ Run Migrations
        run: npx prisma migrate deploy

      - name: 🏗️ Build project
        run: npm run build

      - name: 🚀 Start or Restart PM2
        run: |
          pm2 describe blendit-backend > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "🔄 Restarting existing app..."
            pm2 restart blendit-backend
          else
            echo "🚀 Starting new app..."
            pm2 start dist/main.js --name blendit-backend
          fi

      - name: 💾 Save PM2 process
        run: pm2 save
